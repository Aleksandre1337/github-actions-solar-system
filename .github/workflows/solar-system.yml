name: Solar System Workflow

on: 
  workflow_dispatch:
  push:
    branches:
      - main
      - 'feature/*'
    
jobs:
  unit-testing:
    name: Unit Testing
    runs-on: self-hosted
    container:
      image: node:18
    services:
      mongo-db:
        image: siddharth67/mongo-db:non-prod
        options: --name mongo
    env:
      MONGO_URI: 'mongodb://mongo:27017/superData'
      MONGO_USERNAME: non-prod-user
      MONGO_PASSWORD: non-prod-password

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Cache NPM Dependencies
      uses: actions/cache@v4.2.0
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
        
    - name: Install Dependencies
      run: npm install
    
    - name: Unit Testing
      run: npm test
          
    - name: Archive Test Result
      if:  always()
      uses: actions/upload-artifact@v3
      with:
        name: Mocha-Test-Result
        path: test-results.xml

  code-coverage:
    name: Code Coverage
    container: 
        image: node:18
    services:
      mongo-db:
        image: siddharth67/mongo-db:non-prod
        options: 
            --name mongo
    env:
        MONGO_URI: 'mongodb://mongo:27017/superData'
        MONGO_USERNAME: non-prod-user
        MONGO_PASSWORD: non-prod-password
    runs-on: self-hosted
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: npm install

    - name: Check Code Coverage
      continue-on-error: true
      run: npm run coverage

    - name: Archive Test Result
      uses: actions/upload-artifact@v3
      with:
        name: Code-Coverage-Result
        path: coverage
        retention-days: 5

  docker:
    name: Containerization
    needs: [unit-testing, code-coverage]
    permissions: 
        packages: write
    runs-on: self-hosted
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Dockerhub Login
      uses: docker/login-action@v2.2.0
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Docker Build For Testing
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        load: true
        tags: ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}

    - name: List Docker Images After Build
      run: docker images

    - name: Docker Image Testing
      run: |
        docker rm --force solar-system-app
        docker run --name solar-system-app -d  \
            -p 3000:3000 \
            -e MONGO_URI=$MONGO_URI \
            -e MONGO_USERNAME=$MONGO_USERNAME \
            -e MONGO_PASSWORD=$MONGO_PASSWORD \
            ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}
        
        export IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' solar-system-app)
        echo $IP
        
        echo Testing Image URL using wget 
        wget -q -O - 127.0.0.1:3000/live | grep live

    - name: Container Registry Push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}
  
  dev-deploy:
    needs: [docker]
    runs-on: self-hosted
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Set KUBECONFIG 
      uses: azure/k8s-set-context@v4
      with:
         method: kubeconfig
         kubeconfig: ${{ secrets.KUBECONFIG_EC2 }}
      
    - name: Check kubectl version and nodes
      run: |
        kubectl version
        kubectl get nodes

    - name: Get Cluster IP of ingress-nginx-controller
      id: get_cluster_ip
      run: |
        CLUSTER_IP=$(kubectl get service --namespace ingress-nginx ingress-nginx-controller -o jsonpath="{.spec.clusterIP}")
        echo "CLUSTER_IP=$CLUSTER_IP" >> $GITHUB_ENV

    - name: Replace Token in Manifest files
      uses: cschleiden/replace-tokens@v1
      with:
        tokenPrefix: '_{_'
        tokenSuffix: '_}_'
        files: '["kubernetes/development/*.yaml"]'
      env:
        NAMESPACE: ${{ vars.NAMESPACE }}
        REPLICAS: ${{ vars.REPLICAS }}
        IMAGE: ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}
        INGRESS_IP: ${{ env.CLUSTER_IP }}
    
    - name: Check Kubernetes Manifests after token replacement
      run: cat kubernetes/development/*.yaml
    
    - name: Create MongoDB Secret
      run: |
        kubectl -n ${{ vars.NAMESPACE }} create secret generic mongo-db-creds \
        --from-literal=MONGO_URI=${{ env.MONGO_URI }} \
        --from-literal=MONGO_USERNAME=${{ vars.MONGO_USERNAME }} \
        --from-literal=MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }} \
        --save-config \
        --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy to Development Environment
      run: kubectl apply -f kubernetes/development